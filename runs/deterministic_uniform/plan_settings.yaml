INDEPENDENT_VARIABLES: [SEED, POINTS.NUM_POINTS]
SAVE_PATHS: true

SEED: [77, 0, 1, 2, 3, 4, 5, 6, 7, 8]

POINTS:
  TYPE: Uniform
  NUM_POINTS: [25, 50, 75, 100]
  SPACE_SIZE: 4000
  FIXED_Z: 500

PLANNER:
  TYPE: OurPlannerDeterministic
  ENVIRONMENT: $env_settings.yaml
  TSP_LOCAL_SEARCH: false
  UAV_DELTA_TIME: 73.0
  UGV_DELTA_TIME: 73.0
  TAKEOFF_LANDING_TIME: 100.0
  UAV_BATTERY_TIME: 600.0
  CHARGE_RATE: 1
  KSI: 0.001

START_POINT: [0, 0]
END_POINT: [4000, 4000]
